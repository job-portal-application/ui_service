name: Deploy production

on:
    push:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps: 
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run build
              run: npm run build

            - name: Build Docker Image
              run: docker build -t ui-service:prod