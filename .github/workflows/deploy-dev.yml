name: Deploy development

on:
    push:
        branches:
            - development

jobs:
    build:
        runs-on: ubuntu-latest

        steps: 
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-version: 20
                cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run build
              run: npm run build

            - name: Build Docker Image
              run: docker build -t ui-service:dev .

            - name: Start Docker container
              run: | 
                docker run -d --name ui-service-test -p 8080:80 ui-service:prod

            - name: Verify conatiner is running
              run: | 
                docker ps